version: '3.7'
services:
  fit-db:
    image: postgres:14.5-bullseye
    ports:
      - 5432:5432
    networks:
      - fit-net
    environment:
      POSTGRES_PASSWORD: fit123!
      POSTGRES_DB: fit
      POSTGRES_USER: fit
    volumes:
      - db:/var/lib/postgresql/data      
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
  fit-files:
    image:  minio/minio:RELEASE.2022-10-29T06-21-33Z
    environment: 
      MINIO_ROOT_USER: s3fit
      MINIO_ROOT_PASSWORD: s3fit123!
      MINIO_REGION: "us-east-1"
    command: server /storage --console-address ":9090"      
    ports:
      - 9000:9000
      - 9090:9090        
    volumes:
      - files:/storage
    networks:
      - fit-net          
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
networks:
  fit-net:
volumes:
  db:
  files:
